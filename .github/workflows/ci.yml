name: CI

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck shared schema
        run: npx tsc --noEmit -p packages/schema/tsconfig.json
      - name: Lint
        run: npm run lint
      - name: Build web apps
        run: npm run build
